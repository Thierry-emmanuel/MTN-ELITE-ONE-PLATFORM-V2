name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    # ✅ FIX 1 — Declare all required services
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mtn_elite_one_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'            # ✅ caches node_modules between runs

      # ── FRONTEND ─────────────────────────────────────────────
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci                  # ✅ FIX 3 — use npm ci

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint
        continue-on-error: true   # ✅ FIX 4 — lint warnings don't block backend

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ── BACKEND ──────────────────────────────────────────────
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci                  # ✅ FIX 3 — use npm ci

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Run backend tests
        run: |
          cd backend
          npm run test
        # ✅ FIX 2 — all environment variables declared
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: mtn_elite_one_test
          DB_SYNCHRONIZE: true
          MONGODB_URI: mongodb://localhost:27017/mtn_elite_one_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci_test_secret_key
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci_test_refresh_secret
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 3000
